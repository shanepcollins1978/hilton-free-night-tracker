<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#104c97" />
  <title>Hilton Free Night Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">Hilton Card Tracker</p>
        <h1>Free Night Progress</h1>
        <p class="subhead">Import Amex CSV statements, route transactions by account number, and avoid duplicate imports.</p>
      </div>
    </header>

    <section class="panel import-box">
      <h2>Import CSV</h2>
      <p class="hint">Choose an Amex CSV file. Transactions are saved locally on this device until you clear them.</p>
      <input type="file" id="csvFile" accept=".csv,text/csv" />
      <div class="button-row">
        <button type="button" class="primary" onclick="importCSV()">Import CSV</button>
        <button type="button" class="secondary" onclick="clearAllTransactions()">Clear All Transactions</button>
      </div>
      <p id="importStatus" class="status"></p>
    </section>

    <section id="trackers" class="trackers"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
