<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hilton Free Night Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Hilton Free Night Tracker</h1>

    <section class="import-box">
      <h2>Import CSV</h2>
      <input type="file" id="csvFile" accept=".csv" />
      <button onclick="importCSV()">Import CSV</button>
      <p class="hint">Uploaded transactions are saved until cleared.</p>
    </section>

    <div id="trackers"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
